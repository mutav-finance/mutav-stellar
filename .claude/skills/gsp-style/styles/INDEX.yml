  - name: nothing
    file: nothing.yml
    tags: [monochrome, industrial, dark, minimal, technical, instrument, mechanical, swiss]
    vibe: "Nothing Phone DNA — OLED black, dot-matrix Doto headlines, red signal accent, zero shadows"

